CONFIG_BOOT_SIGNATURE_TYPE_NONE=y
CONFIG_BOOT_UPGRADE_ONLY=y
CONFIG_BOOT_VALIDATE_SLOT0=n
CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=n
CONFIG_BOOT_MAX_IMG_SECTORS=120

# Feed the watchdog during flash operations so the IWDG doesn't
# reset the MCU mid-upgrade (erasing 234KB takes several seconds).
CONFIG_BOOT_WATCHDOG_FEED=y
